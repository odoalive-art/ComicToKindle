appId: com.comictokindle.app
productName: ComicToKindle
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # 开发文件不进包
  - '!{AGENTS.md,components.json}'
  - '!{.claude,.gemini}/**'
  - '!{docs,design-system,.npm-cache}/**'
  - '!**/*.tsbuildinfo'
  # mac arm64 内测包只需 arm64 7za，剔除其他平台/架构二进制
  - '!node_modules/7zip-bin/{linux,win}/**'
  - '!node_modules/7zip-bin/mac/x64/**'
asarUnpack:
  - resources/**
  - node_modules/7zip-bin/**
  - node_modules/sharp/**
  - node_modules/@img/**
  - node_modules/@napi-rs/canvas/**
  - node_modules/@napi-rs/canvas-*/**
win:
  executableName: ComicToKindle
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    # dmg = 分发安装包；zip = electron-updater/Squirrel.Mac 自动更新用的增量来源
    - dmg
    - zip
  # 签名身份：
  # - identity:null = ad-hoc 签名（无自动更新；仅快速内测，首次打开需右键→打开）
  # - 自签发布：构建时传 CTK_SIGN_IDENTITY=<自签证书名>，build-mac-dmg.mjs 会用
  #   `-c.mac.identity` 覆盖此处的 null，从而用自签证书签名（自动更新依赖稳定签名身份）
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}-${env.BUILD_STAMP}.${ext}
  title: ${productName} ${version}
  writeUpdateInfo: false
  contents:
    - x: 130
      y: 220
      type: file
      path: dist/mac-arm64/ComicToKindle.app
      name: ComicToKindle.app
    - x: 410
      y: 220
      type: link
      path: /Applications
    - x: 270
      y: 360
      type: file
      path: build/release-notes-current.txt
      name: 版本说明.txt
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
# 自动更新 feed：GitHub Releases。配了 publish 后即使本地 --publish never，
# electron-builder 也会生成 latest-mac.yml（electron-updater 据此发现新版）。
publish:
  provider: github
  owner: odoalive-art
  repo: ComicToKindle
