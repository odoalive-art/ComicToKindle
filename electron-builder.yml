appId: com.comictokindle.app
productName: ComicToKindle
directories:
  buildResources: build
files:
  - '!**/.vscode/*'
  - '!src/*'
  - '!electron.vite.config.{js,ts,mjs,cjs}'
  - '!{.eslintcache,eslint.config.mjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}'
  - '!{.env,.env.*,.npmrc,pnpm-lock.yaml}'
  - '!{tsconfig.json,tsconfig.node.json,tsconfig.web.json}'
  # 开发文件不进包
  - '!{AGENTS.md,components.json}'
  - '!{.claude,.gemini}/**'
  - '!{docs,design-system,.npm-cache}/**'
  - '!**/*.tsbuildinfo'
  # mac arm64 内测包只需 arm64 7za，剔除其他平台/架构二进制
  - '!node_modules/7zip-bin/{linux,win}/**'
  - '!node_modules/7zip-bin/mac/x64/**'
asarUnpack:
  - resources/**
  - node_modules/7zip-bin/**
  - node_modules/sharp/**
  - node_modules/@img/**
  - node_modules/@napi-rs/canvas/**
  - node_modules/@napi-rs/canvas-*/**
win:
  executableName: ComicToKindle
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
mac:
  target:
    - dmg
  # 内测不走 Developer ID：identity:null 跳过证书查找，改用 ad-hoc 签名
  # （Apple Silicon 需 ad-hoc 才能启动）。测试者首次打开需右键→打开或去隔离属性。
  identity: null
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    - NSCameraUsageDescription: Application requests access to the device's camera.
    - NSMicrophoneUsageDescription: Application requests access to the device's microphone.
    - NSDocumentsFolderUsageDescription: Application requests access to the user's Documents folder.
    - NSDownloadsFolderUsageDescription: Application requests access to the user's Downloads folder.
  notarize: false
dmg:
  artifactName: ${name}-${version}-${env.BUILD_STAMP}.${ext}
  title: ${productName} ${version}
  writeUpdateInfo: false
  contents:
    - x: 130
      y: 220
      type: file
      path: dist/mac-arm64/ComicToKindle.app
      name: ComicToKindle.app
    - x: 410
      y: 220
      type: link
      path: /Applications
    - x: 270
      y: 360
      type: file
      path: build/release-notes-current.txt
      name: 版本说明.txt
linux:
  target:
    - AppImage
    - snap
    - deb
  maintainer: electronjs.org
  category: Utility
appImage:
  artifactName: ${name}-${version}.${ext}
npmRebuild: false
publish: null
